name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: typecheck · build · test · smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # The equivalence verifier (Tier-2) needs a real browser. Installing
      # Chromium lets the @domflax/verify tests run for real instead of
      # skipping; without this they skip cleanly and the suite still passes.
      - name: Install Chromium (equivalence verifier)
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm test

      - name: Dist smoke (built package round-trips a real module)
        run: npm run smoke
